<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Galilei - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="p-8">
            <div class="flex justify-center mb-6">
                <div class="bg-orange-100 p-4 rounded-full">
                    <i class="lucide-coffee text-orange-600 w-10 h-10"></i>
                </div>
            </div>
            <h1 class="text-3xl font-bold text-center text-slate-800 mb-2">Bar Galilei</h1>
            <p class="text-center text-slate-500 mb-8">Salta la coda, ordina ora!</p>

            <div id="loginForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Scolastica</label>
                        <input type="email" id="email" placeholder="nome.cognome@lscgalilei.it" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="password" placeholder="••••••••" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <button onclick="login()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-200 transition-all active:scale-95">
                        Accedi
                    </button>
                    <p class="text-center text-sm text-slate-500 mt-4">
                        Non hai un account? <a href="#" onclick="toggleForm()" class="text-orange-600 font-semibold">Registrati</a>
                    </p>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email Scolastica (@lscgalilei.it)</label>
                        <input type="email" id="regEmail" placeholder="nome.cognome@lscgalilei.it" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="regPassword" placeholder="••••••••" 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition-all">
                    </div>
                    <button onclick="register()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-95">
                        Crea Account
                    </button>
                    <p class="text-center text-sm text-slate-500 mt-4">
                        Hai già un account? <a href="#" onclick="toggleForm()" class="text-orange-600 font-semibold">Accedi</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (data.success) {
                window.location.href = data.role === 'admin' ? '/admin.html' : '/menu.html';
            } else {
                alert(data.error);
            }
        }

        async function register() {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (data.success) {
                alert('Registrazione completata! Ora puoi accedere.');
                toggleForm();
            } else {
                alert(data.error);
            }
        }
    </script>
</body>
</html>
